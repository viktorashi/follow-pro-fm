name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'pe-bune/go.mod'
          cache-dependency-path: 'pe-bune/go.sum'

      - name: Test & coverage
        working-directory: pe-bune
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile junit.xml -- -coverprofile=coverage.out ./pkg/...
          go tool cover -func=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: pe-bune/coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: pe-bune/junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results

      - name: Lint
        working-directory: pe-bune
        run: ./scripts/golangci-lint-shim.sh run
