name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'pe-bune/go.mod'

      - name: Run tests
        working-directory: pe-bune
        run: go test -coverprofile=coverage.out ./pkg/...

      - name: Print coverage
        working-directory: pe-bune
        run: go tool cover -func=coverage.out

      - name: Lint
        working-directory: pe-bune
        run: ./scripts/golangci-lint-shim.sh run
