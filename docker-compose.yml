services:
  pro-fm-poller:
    build: .
    ports:
      - "8080:8080"
    environment:
      - AUDIOS_DIR=/data/audios
      - WAPP_DB_PATH=/data/wapp.sqlite
      # Add any other required environment variables for local testing here
    volumes:
      # Mount the local ./audios directory to /data/audios in the container
      - ./audios:/data/audios
      # Mount a local data directory for the SQLite database so it persists between restarts
      - ./data:/data
