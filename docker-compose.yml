services:
  pro-fm-poller:
    build: .
    ports:
      - "8080:8080"
    environment:
      - AUDIOS_DIR=/data/audios
      - WAPP_DB_PATH=/data/wapp.sqlite
      # Add any other required environment variables for local testing here
    volumes:
      # Mount the local data directory (containing audios/ and wapp.sqlite) to /data
      - ./data:/data
